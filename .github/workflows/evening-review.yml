name: Evening Review

on:
  workflow_dispatch:

jobs:
  evening-review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install anthropic requests pytz
      - name: Run Evening Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/evening_review.py
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Market Brief Bot"
          git add data/
          git diff --staged --quiet || git commit -m "📊 $(date -u '+%Y-%m-%d') - evening"
          git push
      - name: Send Email
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RUN_MODE: evening
        run: python scripts/send_email.py
